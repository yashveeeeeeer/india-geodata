name: Validate metadata

on:
  pull_request:
    paths:
      - 'data/**/metadata.json'
  push:
    branches: [main]
    paths:
      - 'data/**/metadata.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - run: python scripts/validate-metadata.py
